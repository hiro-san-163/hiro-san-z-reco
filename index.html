<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>トップページ - hiro-sanの山歩き</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">トップ</a></li>
        <li><a href="records/index.html">山行記録</a></li>
        <li><a href="about.html">自己紹介</a></li>
        <li><a href="blog.html">ブログ</a></li>
        <li><a href="other.html">その他</a></li>
      </ul>
    </nav>
  </header>
  <!-- ヘッダー内でタイトルなどと一緒に置く -->
  <button class="menu-toggle" aria-label="メニュー切替">☰</button>

  <div class="container">
    <h1>hiro-sanの山歩き</h1>
    <p>ようこそ！ここでは山行記録や活動の様子をまとめています。</p>

    <h2>最新の山行記録</h2>
    <div class="card-list" id="latest-cards"></div>
  </div>

  <!-- Bloggerから最新5件を取得 -->
   <script>
    const feedURL = "https://api.rss2json.com/v1/api.json?rss_url=https://hiro-san-163.blogspot.com/feeds/posts/default?alt=json&max-results=5";

    fetch(feedURL)
      .then(response => response.json())
      .then(data => {
        let output = "";
        data.items.forEach(item => {
          const date = new Date(item.pubDate).toLocaleDateString("ja-JP", {
            year: "numeric", month: "short", day: "numeric"
          });
          const thumb = item.thumbnail || "https://via.placeholder.com/300x180?text=No+Image";

          output += `
            <div class="blog-card">
              <a href="${item.link}" target="_blank">
                <img src="${thumb}" alt="${item.title}">
                <div class="blog-card-text">
                  <h3>${item.title}</h3>
                  <p>${date}</p>
                </div>
              </a>
            </div>
          `;
        });
        document.getElementById("blog-cards").innerHTML = output;
      })
      .catch(() => {
        document.getElementById("blog-cards").innerHTML =
          "<p style='color:#888;'>記事を読み込めませんでした。</p>";
      });
  </script>

</body>
</html>
