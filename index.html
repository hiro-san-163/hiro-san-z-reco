<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>山行記録検索</title>
  <style>
    :root { --bg:#f7f7f9; --fg:#222; --muted:#666; --brand:#2c7be5; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans JP", sans-serif; background: var(--bg); color: var(--fg); margin:0; }
    header { padding: 1rem; background: white; box-shadow: 0 1px 3px rgba(0,0,0,.06); position: sticky; top:0; z-index: 10; }
    h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: .75rem; }
    select, input[type="number"] { width: 100%; padding: .5rem .75rem; border: 1px solid #ddd; border-radius: .5rem; background: #fff; font-size: .95rem; }
    main { padding: 1rem; }
    .toolbar { display:flex; align-items:center; gap:1rem; margin:.5rem 0 1rem; color:var(--muted); }
    .list { display:grid; grid-template-columns: 1fr; gap:.5rem; }
    .card { background:white; border:1px solid #eee; border-radius:.75rem; padding:.75rem; display:grid; grid-template-columns: 140px 1fr 120px; grid-template-areas: 'date title actions' 'meta meta actions'; gap:.25rem .75rem; align-items:center; }
    .card .date { grid-area: date; font-variant-numeric: tabular-nums; color:var(--muted); }
    .card .title { grid-area: title; font-weight:600; }
    .card .meta { grid-area: meta; color:var(--muted); font-size:.9rem; }
    .card .actions { grid-area: actions; text-align:right; }
    .card a.btn { display:inline-block; padding:.4rem .6rem; border-radius:.5rem; background:var(--brand); color:white; text-decoration:none; font-size:.9rem; }
    .pagination { display:flex; flex-wrap:wrap; gap:.25rem; margin: 1rem 0; }
    .pagination button { padding:.4rem .6rem; border:1px solid #ddd; background:white; border-radius:.5rem; }
    .pagination button.active { background: var(--brand); color:#fff; border-color: var(--brand); }
    .empty { padding:2rem; text-align:center; color:var(--muted); }

    /* ← 追加されたフォーカス用CSS */
    .card.is-focused {
      outline: 2px solid var(--brand);
      background: #f0f6ff;
      cursor: pointer;
    }
  </style>
</head>
<body>
<header>
  <h1>山行記録検索</h1>
  <div class="filters">
    <select id="year"></select>
    <select id="area"></select>
    <select id="genre"></select>
    <select id="sort">
      <option value="date_desc" selected>並び替え：日付 (新しい順)</option>
      <option value="date_asc">並び替え：日付 (古い順)</option>
      <option value="title_asc">並び替え：タイトル (A→Z)</option>
      <option value="title_desc">並び替え：タイトル (Z→A)</option>
    </select>
    <input id="pageSize" type="number" min="5" max="100" step="5" value="20" title="1ページの表示件数" />
  </div>
</header>
<main>
  <div class="toolbar">
    <div id="count"></div>
  </div>
  <div id="list" class="list"></div>
  <div id="pagination" class="pagination"></div>
</main>

<script>
(async function(){
  const resp = await fetch('records.json');
  const raw = await resp.json();
  const records = Array.isArray(raw) ? raw : (raw.records || raw.items || raw.data || Object.values(raw));

  const norm = records.map(r => ({
    date:  r.date  || r.Date  || r['日付']   || '',
    area:  r.area  || r.Area  || r['山域']   || '',
    genre: r.genre || r.Genre || r['ジャンル'] || '',
    title: r.title || r.Title || r['タイトル'] || r.place || r['場所'] || '',
    url:   r.yamareco_url || r.url || r.URL || r.link || ''
  })).filter(r => r);

  function toYear(d){
    if(!d) return null;
    const m = String(d).match(/(\d{4})/);
    return m ? Number(m[1]) : null;
  }

  const years  = Array.from(new Set(norm.map(r => toYear(r.date)).filter(Boolean))).sort((a,b)=>b-a);
  const areas  = Array.from(new Set(norm.map(r => r.area).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b),'ja'));
  const genres = Array.from(new Set(norm.map(r => r.genre).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b),'ja'));

  const yearSel  = document.getElementById('year');
  const areaSel  = document.getElementById('area');
  const genreSel = document.getElementById('genre');

  function fillSelect(sel, label, values){
    sel.innerHTML = '';
    const optAll = document.createElement('option');
    optAll.value = '';
    optAll.textContent = `${label}：すべて`;
    sel.appendChild(optAll);
    values.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v;
      sel.appendChild(o);
    });
  }
  fillSelect(yearSel,  '年',    years);
  fillSelect(areaSel,  '山域',  areas);
  fillSelect(genreSel, 'ジャンル', genres);

  const sortSel       = document.getElementById('sort');
  const pageSizeInput = document.getElementById('pageSize');
  const countEl       = document.getElementById('count');
  const listEl        = document.getElementById('list');
  const pagerEl       = document.getElementById('pagination');

  let currentPage = 1;

  /* ← フォーカス管理用 */
  let focusedCard = null;

  function applyFilters(){
    const y = yearSel.value;
    const a = areaSel.value;
    const g = genreSel.value;

    let filtered = norm.filter(r => (
      (!y || toYear(r.date) === Number(y)) &&
      (!a || r.area === a) &&
      (!g || r.genre === g)
    ));

    const s = sortSel.value;
    filtered.sort((r1, r2) => {
      const d1 = new Date(r1.date), d2 = new Date(r2.date);
      const t1 = String(r1.title||''), t2 = String(r2.title||'');
      switch(s){
        case 'date_asc':   return d1 - d2;
        case 'title_asc':  return t1.localeCompare(t2,'ja');
        case 'title_desc': return t2.localeCompare(t1,'ja');
        default:           return d2 - d1;
      }
    });

    renderList(filtered);
  }

  function renderList(items){
    const pageSize   = Math.max(5, Math.min(100, Number(pageSizeInput.value)||20));
    const total      = items.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if(currentPage > totalPages) currentPage = 1;

    countEl.textContent = `該当件数：${total}件 / ページサイズ：${pageSize}`;

    const start     = (currentPage - 1) * pageSize;
    const pageItems = items.slice(start, start + pageSize);

    listEl.innerHTML = '';
    focusedCard = null;

    if(pageItems.length === 0){
      listEl.innerHTML = '<div class="empty">該当する記録がありません</div>';
    } else {
      const frag = document.createDocumentFragment();
      pageItems.forEach(r => {
        const card   = document.createElement('div');
        card.className = 'card';
        card.tabIndex = 0;
        card.dataset.url = r.url || '';

        const date   = document.createElement('div');
        date.className = 'date';
        date.textContent = r.date || '';

        const title  = document.createElement('div');
        title.className = 'title';
        title.textContent = r.title || '(タイトル未設定)';

        const meta   = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `山域：${r.area || '-'}　ジャンル：${r.genre || '-'}`;

        const actions= document.createElement('div');
        actions.className = 'actions';
        if(r.url){
          const a = document.createElement('a');
          a.className = 'btn';
          a.href = r.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = '記事を開く';
          actions.appendChild(a);
        }

        card.addEventListener('mouseenter', () => {
          if (focusedCard) focusedCard.classList.remove('is-focused');
          focusedCard = card;
          card.classList.add('is-focused');
        });

        card.addEventListener('mouseleave', () => {
          card.classList.remove('is-focused');
          focusedCard = null;
        });

        card.addEventListener('dblclick', () => {
          if (card.dataset.url) window.open(card.dataset.url, '_blank');
        });

        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && card.dataset.url){
            window.open(card.dataset.url, '_blank');
          }
        });

        card.appendChild(date);
        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(actions);
        frag.appendChild(card);
      });
      listEl.appendChild(frag);
    }

    pagerEl.innerHTML = '';
    function addBtn(label, page, disabled=false, active=false){
      const b = document.createElement('button');
      b.textContent = label;
      if(disabled){ b.disabled = true; }
      if(active){ b.classList.add('active'); }
      b.addEventListener('click', ()=>{ currentPage = page; renderList(items); });
      pagerEl.appendChild(b);
    }

    addBtn('« 先頭', 1, currentPage === 1);
    addBtn('‹ 前', Math.max(1, currentPage - 1), currentPage === 1);

    const windowSize = 5;
    let startPage = Math.max(1, currentPage - Math.floor(windowSize/2));
    let endPage   = Math.min(totalPages, startPage + windowSize - 1);
    if(endPage - startPage + 1 < windowSize){
      startPage = Math.max(1, endPage - windowSize + 1);
    }
    for(let p = startPage; p <= endPage; p++){
      addBtn(String(p), p, false, p === currentPage);
    }

    addBtn('次 ›',   Math.min(totalPages, currentPage + 1), currentPage === totalPages);
    addBtn('最後 »', totalPages, currentPage === totalPages);
  }

  [yearSel, areaSel, genreSel, sortSel, pageSizeInput].forEach(el =>
    el.addEventListener('change', ()=>{ currentPage = 1; applyFilters(); })
  );

  /* ↑ ↓ キーでフォーカス移動 */
  document.addEventListener('keydown', (e) => {
    if (!['ArrowDown','ArrowUp'].includes(e.key)) return;

    const cards = Array.from(document.querySelectorAll('.card'));
    if (!cards.length) return;

    let index = focusedCard ? cards.indexOf(focusedCard) : -1;

    if (e.key === 'ArrowDown') {
      index = Math.min(cards.length - 1, index + 1);
    } else {
      index = Math.max(0, index - 1);
    }

    if (focusedCard) focusedCard.classList.remove('is-focused');
    focusedCard = cards[index];

    if (focusedCard) {
      focusedCard.classList.add('is-focused');
      focusedCard.focus();
      focusedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  applyFilters();
})();
</script>
</body>
</html>
