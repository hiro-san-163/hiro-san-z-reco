<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>山行記録 - hiro-sanの山歩き</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../favicon.ico">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="../index.html">トップ</a></li>
        <li><a href="../index.html">山行記録</a></li>
        <li><a href="../about.html">自己紹介</a></li>
        <li><a href="../blog.html">ブログ</a></li>
        <li><a href="../other.html">その他</a></li>
      </ul>
    </nav>
  </header>

  <h1>最新の山行記録</h1>
    <p>最新の山行記録を5件表示しています。</p>
 <div id="blog-cards" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;"></div>

  <div class="container">
    <h1>山行記録</h1>
    <p>年別、山域別、ジャンル別に山行記録を整理しています。</p>

    <ul>
      <li><a href="year.html">年別</a></li>
      <li><a href="area.html">山域別</a></li>
      <li><a href="type.html">ジャンル別</a></li>
    </ul>
  </div>

 <script>
    const feedURL = "https://api.rss2json.com/v1/api.json?rss_url=https://hiro-san-163.blogspot.com/feeds/posts/default/-/ハイキング?max-results=5";

    fetch(feedURL)
      .then(response => response.json())
      .then(data => {
        let output = "";
        data.items.forEach(item => {
          const date = new Date(item.pubDate).toLocaleDateString("ja-JP", {
            year: "numeric", month: "short", day: "numeric"
          });
          const thumb = item.thumbnail || "https://via.placeholder.com/300x180?text=No+Image";

          output += `
            <div class="blog-card">
              <a href="${item.link}" target="_blank">
                <img src="${thumb}" alt="${item.title}">
                <div class="blog-card-text">
                  <h3>${item.title}</h3>
                  <p>${date}</p>
                </div>
              </a>
            </div>
          `;
        });
        document.getElementById("blog-cards").innerHTML = output;
      })
      .catch(() => {
        document.getElementById("blog-cards").innerHTML =
          "<p style='color:#888;'>記事を読み込めませんでした。</p>";
      });
  </script>

</body>
</html>
