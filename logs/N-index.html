<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <base href="/hiro-san-z-reco/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>山行記録検索 - hiro-sanの山歩き</title>

  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/N-search.css">

  <link rel="icon" href="favicon.ico">
</head>
<body>

  <div id="loading" class="loading">読み込み中...</div>

  <div id="header"></div>

  <header class="search-header">
    <nav class="breadcrumb">
      <ul>
        <li><a href="../index.html">ホーム</a></li>
        <li>logs</li>
      </ul>
    </nav>

    <h1>山行記録検索</h1>

    <p class="page-desc">
      年・山域・ジャンル・キーワードから山行記録を絞り込めます。
    </p>

    <div class="keyword-search">
      <input type="text" id="keyword"
        placeholder="キーワード（山名・内容・印象的な言葉など）">
    </div>

    <div class="filters">

      <!-- ★修正 -->
      <select id="dataSource" multiple></select>

      <!-- ★追加 -->
      <div id="dataSourceCheckboxes" class="ds-checkboxes"></div>

      <select id="year"></select>
      <select id="month"></select>
      <select id="area"></select>
      <select id="genre"></select>

      <select id="sort">
        <option value="date_desc" selected>日付（新しい順）</option>
        <option value="date_asc">日付（古い順）</option>
        <option value="title_asc">タイトル（A→Z）</option>
        <option value="title_desc">タイトル（Z→A）</option>
      </select>

      <input id="pageSize" type="number" min="5" max="100" step="5" value="20">
    </div>
  </header>

  <main class="container">
    <div id="count" class="search-result-count"></div>
    <div id="list" class="list"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <div id="footer"></div>

  <script src="JS/include.js" defer></script>
  <script src="JS/N-search.js" defer></script>

  <script>
    setBreadcrumb("logs-index");
  </script>

</body>
</html>
